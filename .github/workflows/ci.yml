name: CI

# Authoritative gate. Runs the same make targets the local pre-push
# hook runs, then adds the container build + Trivy image scan. Secrets-
# free — this workflow is expected to be green on every PR and push.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Install project-local dev tools
        run: make dev-setup

      - name: Vet
        run: make vet

      - name: Test (race detector)
        run: make test

      - name: Lint
        run: make lint

      - name: Vulnerability scan
        run: make vuln

      - name: Actionlint
        run: make actionlint

      - name: Hadolint
        run: make hadolint

      - name: Build container image
        run: make image

      - name: Trivy image scan (HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: aegis-greeter:latest
          severity: HIGH,CRITICAL
          exit-code: '1'
