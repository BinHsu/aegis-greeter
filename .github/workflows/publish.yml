name: Publish

# Builds the production image ONCE, pushes it to the single shared ECR,
# captures the immutable image DIGEST, and opens an auto-merge PR that
# bumps that digest in the deploy repo's STAGING overlay
# (aegis-greeter-deploy). ArgoCD in the cluster reconciles from there —
# this workflow never touches the cluster directly. That is the GitOps
# invariant.
#
# Build once, promote by digest (platform-aws ADR-10):
#   - The artifact is built exactly once and referenced everywhere by its
#     content digest (aegis-greeter@sha256:...), never rebuilt per env.
#   - This workflow promotes the digest into STAGING only. Prod promotion
#     is a separate, gated PR against the prod overlay — out of scope here.
#   - Env differences (replicas/limits/host/role-trust) live in the
#     deploy-repo overlays, not in the artifact.
#
# Single shared registry (platform-aws ADR-10): vars.ECR_REPO_URL /
# vars.ECR_REGISTRY / vars.OIDC_ROLE_ARN now point at ONE shared ECR in a
# dedicated "aegis-deployment" account (Deployments OU). The old per-env
# dev/prod registry split is gone — staging and prod clusters both PULL
# from this one registry by digest. The OIDC role is the scoped workload
# push role (ecr:PutImage) in that account; the deployment account's
# 12-digit id is never hardcoded here, it is carried by the var values.
#
# Inert until configured: the job is gated on vars.ECR_REPO_URL, so a
# fresh clone with no AWS/PAT wiring shows this workflow as skipped, not
# failed. Required configuration before it activates:
#   - repo variables: ECR_REPO_URL, ECR_REGISTRY, OIDC_ROLE_ARN, AWS_REGION
#     (repointed at the aegis-deployment-account ECR at rollout)
#   - repo secret:    INFRA_REPO_PAT (fine-grained PAT, scoped to
#                     aegis-greeter-deploy contents:write +
#                     pull-requests:write, with an expiry)
# ECR_REPO_URL and OIDC_ROLE_ARN are Terraform outputs of the
# aegis-deployment account's registry/ environment.

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write # mint the OIDC token for AWS role assumption

concurrency:
  group: publish-main
  cancel-in-progress: false # never abort a half-completed push

jobs:
  publish:
    if: vars.ECR_REPO_URL != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      # CI already ran the full gate on this commit — branch protection
      # requires it before merge. Re-run the fast checks only, as a
      # cheap tripwire against a misconfigured branch protection rule.
      - name: Sanity gate (vet + test)
        run: make vet test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          role-to-assume: ${{ vars.OIDC_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to Amazon ECR
        run: |
          aws ecr get-login-password --region "${{ vars.AWS_REGION }}" \
            | docker login --username AWS --password-stdin "${{ vars.ECR_REGISTRY }}"

      - name: Resolve image tag
        # The SHA tag is a human-readable convenience handle in the
        # registry. It is NOT what the deploy repo pins to — promotion is
        # by digest. The ECR repo is IMMUTABLE, so this tag can never be
        # repointed at different bytes. See ADR AG-03.
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Build and push image (once), capturing the digest
        run: |
          # ONE build. --load makes the bytes available locally for the
          # Trivy gate below; --push registers the same bytes in the
          # single shared ECR; --metadata-file emits the registry
          # manifest digest (containerimage.digest) so the deploy repo can
          # pin by digest. There is exactly one build and one digest — the
          # build-once posture. See platform-aws ADR-10.
          docker buildx build \
            --platform linux/amd64 \
            --build-arg VERSION="${IMAGE_TAG}" \
            --build-arg COMMIT="${GITHUB_SHA}" \
            --tag "${{ vars.ECR_REPO_URL }}:${IMAGE_TAG}" \
            --metadata-file metadata.json \
            --load \
            --push \
            .

      - name: Trivy scan the release image (HIGH/CRITICAL)
        # Scans the loaded bytes — the same content that was pushed in the
        # single build step above. A failure here gates promotion: the
        # digest is never written into the deploy repo.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ vars.ECR_REPO_URL }}:${{ env.IMAGE_TAG }}
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Resolve image digest
        # REGISTRY-AUTHORITATIVE: `aws ecr describe-images` by the
        # immutable just-pushed tag is the only ground truth for what is
        # pullable. On 2026-06-12 buildx metadata reported sha256:46c383…
        # while the registry's freshly-pushed tag pointed at sha256:0e6f3e…
        # (the 46c383 manifest did not exist in the repo — a buildx
        # provenance/index reporting quirk). That wrong digest flowed into
        # the deploy-repo PR → pod ErrImagePull NotFound. The fix: describe-
        # images is PRIMARY; buildx metadata is a cross-check only.
        env:
          ECR_REPO_URL: ${{ vars.ECR_REPO_URL }}
        run: |
          set -euo pipefail
          # PRIMARY: ask the registry what digest the just-pushed tag
          # resolves to. Strip the registry/path prefix to the bare ECR repo
          # name (everything after the last '/').
          REPO_NAME="${ECR_REPO_URL##*/}"
          DIGEST="$(aws ecr describe-images \
            --region "${{ vars.AWS_REGION }}" \
            --repository-name "${REPO_NAME}" \
            --image-ids imageTag="${IMAGE_TAG}" \
            --query 'imageDetails[0].imageDigest' --output text)"

          # CROSS-CHECK: read the buildx metadata value and warn if it
          # differs from what the registry just confirmed. The registry wins
          # either way — this warning surfaces provenance/index quirks early.
          BUILDX_DIGEST="$(jq -r '.["containerimage.digest"] // empty' metadata.json 2>/dev/null || true)"
          if [ -n "${BUILDX_DIGEST}" ] && [ "${BUILDX_DIGEST}" != "${DIGEST}" ]; then
            echo "::warning::buildx metadata digest (${BUILDX_DIGEST}) differs from registry digest (${DIGEST}); registry value used (2026-06-12 ErrImagePull precedent)"
          fi

          case "${DIGEST}" in
            sha256:*) ;;
            *) echo "::error::resolved digest is not a sha256 ref: ${DIGEST}"; exit 1 ;;
          esac
          echo "IMAGE_DIGEST=${DIGEST}" >> "$GITHUB_ENV"
          echo "Resolved image digest: ${DIGEST}"

      - name: Promote digest into the deploy repo (staging overlay, via PR)
        env:
          INFRA_REPO_PAT: ${{ secrets.INFRA_REPO_PAT }}
        run: |
          set -euo pipefail
          # The deploy repo's main is ruleset-protected: PR required,
          # CodeRabbit required status check, signed commits, squash-only.
          # A direct `git push origin main` only ever landed via the admin
          # bypass — so the bump goes through a branch + auto-merge PR
          # instead. A shallow clone is enough: the bump lands on a NEW
          # branch, nothing rebases onto main anymore. The fine-grained
          # PAT is scoped to aegis-greeter-deploy contents:write +
          # pull-requests:write only.
          git clone --depth 1 \
            "https://x-access-token:${INFRA_REPO_PAT}@github.com/BinHsu/aegis-greeter-deploy.git" \
            deploy
          cd deploy/k8s/overlays/staging

          # Pin STAGING to the immutable digest. `kustomize edit set image`
          # writes images[].digest (and clears any newTag) for the
          # `aegis-greeter` entry. The deploy repo carries only the bare
          # image NAME + the digest — the registry URL is the single
          # aegis-deployment ECR, injected at ArgoCD sync time as the
          # `aegis.binhsu.org/ecr-repository` annotation (the deploy repo's
          # overlays splice it in front of the digest via kustomize
          # `replacements`), so the account ID never lands in the deploy
          # repo. kustomize is preinstalled on ubuntu runners (no
          # curl|bash, no extra tool install). See platform-aws ADR-10.
          # Prod is promoted separately by a gated PR against
          # k8s/overlays/prod — this workflow never writes prod.
          kustomize edit set image "aegis-greeter@${IMAGE_DIGEST}"

          cd "${GITHUB_WORKSPACE}/deploy"
          git config user.name "BinHsu"
          git config user.email "10249382+BinHsu@users.noreply.github.com"
          git add k8s/overlays/staging/kustomization.yaml
          if git diff --cached --quiet; then
            echo "image digest unchanged — nothing to commit"
            exit 0
          fi

          BRANCH="release/digest-${IMAGE_TAG}"
          git checkout -b "${BRANCH}"
          git commit -m "chore(release): bump staging digest to ${IMAGE_TAG}" \
            -m "Image: aegis-greeter@${IMAGE_DIGEST}"
          # --force: a re-run of this workflow for the same source commit
          # recreates the same branch; the fresh bump replaces the
          # previous attempt.
          git push --force origin "${BRANCH}"

          # PR + auto-merge with the SAME fine-grained PAT (it carries
          # pull-requests:write next to contents:write). `gh pr merge
          # --auto` only ARMS auto-merge: GitHub squash-merges after the
          # required CodeRabbit check/review passes — nothing merges
          # before that gate. Requires "Allow auto-merge" enabled on the
          # deploy repo. The PR body cites the bare image name + digest,
          # NOT the registry URL — the URL embeds the AWS account ID and
          # the deploy repo is public.
          export GH_TOKEN="${INFRA_REPO_PAT}"
          # Re-run for the same source commit: reuse the still-open PR
          # instead of failing on a duplicate create. `.[].number` prints
          # nothing when the list is empty (and `gh pr list` exits 0).
          EXISTING_PR="$(gh pr list --repo BinHsu/aegis-greeter-deploy \
            --head "${BRANCH}" --state open --json number --jq '.[].number')"
          if [ -z "${EXISTING_PR}" ]; then
            gh pr create --repo BinHsu/aegis-greeter-deploy \
              --base main --head "${BRANCH}" \
              --title "chore(release): bump staging digest to ${IMAGE_TAG}" \
              --body "$(printf 'Image: %s\n\nPromotes the freshly built digest into the staging overlay (build once, promote by digest — platform-aws ADR-10).\n\nAutomated by aegis-greeter publish.yml (source commit %s). Auto-merge is armed: the PR merges once the required CodeRabbit check/review passes.' \
                "aegis-greeter@${IMAGE_DIGEST}" "${GITHUB_SHA}")"
          fi
          gh pr merge --auto --squash \
            --repo BinHsu/aegis-greeter-deploy "${BRANCH}"
