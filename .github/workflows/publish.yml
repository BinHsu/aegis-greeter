name: Publish

# Builds the production image, pushes it to ECR, and commits the new
# image tag back to the deploy repo (aegis-greeter_deploy). ArgoCD in
# the cluster reconciles from there — this workflow never touches the
# cluster directly. That is the GitOps invariant.
#
# Inert until configured: the job is gated on vars.ECR_REPO_URL, so a
# fresh clone with no AWS/PAT wiring shows this workflow as skipped, not
# failed. Required configuration before it activates:
#   - repo variables: ECR_REPO_URL, ECR_REGISTRY, OIDC_ROLE_ARN, AWS_REGION
#   - repo secret:    INFRA_REPO_PAT (fine-grained PAT, scoped to
#                     aegis-greeter_deploy contents:write, with an expiry)
# ECR_REPO_URL and OIDC_ROLE_ARN are Terraform outputs of aegis-platform's
# platform/ environment.

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write # mint the OIDC token for AWS role assumption

concurrency:
  group: publish-main
  cancel-in-progress: false # never abort a half-completed push

jobs:
  publish:
    if: vars.ECR_REPO_URL != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      # CI already ran the full gate on this commit — branch protection
      # requires it before merge. Re-run the fast checks only, as a
      # cheap tripwire against a misconfigured branch protection rule.
      - name: Sanity gate (vet + test)
        run: make vet test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          role-to-assume: ${{ vars.OIDC_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to Amazon ECR
        run: |
          aws ecr get-login-password --region "${{ vars.AWS_REGION }}" \
            | docker login --username AWS --password-stdin "${{ vars.ECR_REGISTRY }}"

      - name: Resolve image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Build image
        run: |
          # SHA tag only. The ECR repo is IMMUTABLE, so a moving
          # `latest` tag cannot be re-pushed — ArgoCD pins to the SHA
          # tag regardless. See ADR AG-03.
          docker buildx build \
            --platform linux/amd64 \
            --build-arg VERSION="${IMAGE_TAG}" \
            --build-arg COMMIT="${GITHUB_SHA}" \
            --tag "${{ vars.ECR_REPO_URL }}:${IMAGE_TAG}" \
            --load \
            .

      - name: Trivy scan the release image (HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ vars.ECR_REPO_URL }}:${{ env.IMAGE_TAG }}
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Push image to ECR
        run: docker push "${{ vars.ECR_REPO_URL }}:${IMAGE_TAG}"

      - name: Commit image tag back to the deploy repo
        env:
          INFRA_REPO_PAT: ${{ secrets.INFRA_REPO_PAT }}
          ECR_REPO_URL: ${{ vars.ECR_REPO_URL }}
        run: |
          set -euo pipefail
          # Full clone (not shallow) of the deploy repo, with a
          # fine-grained PAT scoped to contents:write on aegis-greeter_deploy
          # only — full history is needed to rebase before pushing.
          git clone \
            "https://x-access-token:${INFRA_REPO_PAT}@github.com/BinHsu/aegis-greeter_deploy.git" \
            deploy
          cd deploy

          # ArgoCD reconciles k8s/overlays/prod. The kustomization
          # images[] entry ships placeholder newName/newTag — the real
          # ECR URL embeds the AWS account ID and cannot be committed to
          # the deploy repo — so CI sets BOTH fields. yq is preinstalled
          # on ubuntu runners (no curl|bash, no extra tool install).
          # Contract confirmed in aegis-stateless#9.
          yq -i '
            (.images[] | select(.name == "aegis-greeter") | .newName) = strenv(ECR_REPO_URL) |
            (.images[] | select(.name == "aegis-greeter") | .newTag)  = strenv(IMAGE_TAG)
          ' k8s/overlays/prod/kustomization.yaml

          git config user.name "BinHsu"
          git config user.email "10249382+BinHsu@users.noreply.github.com"
          git add k8s/overlays/prod/kustomization.yaml
          if git diff --cached --quiet; then
            echo "image tag unchanged — nothing to commit"
            exit 0
          fi
          git commit -m "Bump aegis-greeter image to ${IMAGE_TAG}"
          # Rebase onto any commits that landed since the clone so the
          # bump lands as a single linear commit on the deploy repo's
          # main.
          git pull --rebase origin main
          git push origin main
